dataset:
  name: movielens_100k
  raw_dir: data/raw
  processed_dir: data/processed
  min_user_interactions: 5
  min_item_interactions: 5
  test_ratio: 0.2
  val_ratio: 0.1
  seed: 42
  item_text_field: title

training:
  top_k: 10
  n_factors: 32
  n_epochs: 10
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  negative_samples: 4
  device: cpu

models:
  run:
    - popularity
    - user_cf
    - item_cf
    - matrix_factorization
    - ncf
    - hybrid

reranking:
  enabled: true
  lambda_diversity: 0.25
  lambda_fairness: 0.15
  protected_group_quantile: 0.5
